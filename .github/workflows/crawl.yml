name: Trigger Mail-On Crawling

on:
  schedule:
    # 매일 9시~21시 KST (= UTC 0~12시) 30분마다
    - cron: "*/30 0-12 * * *"
  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  trigger-crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Koyeb server
        run: |
          echo "⏳ Waking up server..."
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SERVER_URL }}/" --max-time 15)
            echo "Attempt $i: HTTP $status"
            if [ "$status" -eq 200 ]; then
              echo "✅ Server is ready"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Server did not respond after 2 minutes"
          exit 1

      - name: Trigger processJobs on Koyeb server
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.SERVER_URL }}/api/cron/process" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120)

          echo "HTTP status: $response"

          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Crawling triggered successfully"
          else
            echo "❌ Failed with status $response"
            exit 1
          fi
